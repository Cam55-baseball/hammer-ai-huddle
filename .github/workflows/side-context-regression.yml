name: side-context-regression

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/lint-side-context.ts"
      - "tests/e2e/side-context/**"
      - ".github/workflows/side-context-regression.yml"
  push:
    branches: [main]

jobs:
  lint:
    name: side-context lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint side-context writes
        run: bun scripts/lint-side-context.ts

  e2e:
    name: side-context E2E (switch-hitter)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Start dev server
        run: bun run dev &
        env:
          NODE_ENV: test
      - name: Wait for server
        run: npx wait-on http://localhost:8080 -t 60000
      - name: Run E2E
        run: bunx playwright test tests/e2e/side-context/switch-hitter.spec.ts --reporter=line
